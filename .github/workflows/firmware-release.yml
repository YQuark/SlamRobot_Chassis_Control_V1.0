name: Release Firmware

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic firmware version without v prefix, for example 0.1.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate version input
        id: version
        shell: bash
        run: |
          version="${{ inputs.version }}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must match X.Y.Z, got: $version" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Ensure tag and release do not already exist
        env:
          TAG: ${{ steps.version.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          git fetch --tags origin
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag $TAG already exists" >&2
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists" >&2
            exit 1
          fi

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi ninja-build

      - name: Configure Debug with release version
        env:
          CHASSIS_FIRMWARE_VERSION: v${{ steps.version.outputs.value }}
        run: cmake --preset Debug

      - name: Build Debug
        run: cmake --build --preset Debug

      - name: Prepare release assets
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          cp build/Debug/F407_V1.0.elf "build/Debug/F407_V1.0-$TAG.elf"
          cp build/Debug/F407_V1.0.map "build/Debug/F407_V1.0-$TAG.map"

      - name: Prepare release notes
        env:
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          short_sha="$(git rev-parse --short "${{ github.sha }}")"
          previous_tag="$(git tag --merged "${{ github.sha }}" --sort=-v:refname 'v[0-9]*' | head -n 1)"

          if [ -n "$previous_tag" ]; then
            changelog_title="Changes since \`$previous_tag\`"
            changelog_range="$previous_tag..${{ github.sha }}"
          else
            changelog_title="Initial release changelog"
            changelog_range="${{ github.sha }}"
          fi

          cat > release-notes.md <<EOF
          ## Firmware Release

          - Version: \`$TAG\`
          - Build: \`Debug\`
          - Commit: \`$short_sha\`

          ## Changelog

          $changelog_title

          EOF

          git log --reverse \
            --pretty=format:'- `%h` %s' \
            "$changelog_range" >> release-notes.md

          cat >> release-notes.md <<EOF

          EOF

      - name: Create release tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$TAG" "${{ github.sha }}"
          git push origin "$TAG"

      - name: Create GitHub Release
        env:
          TAG: ${{ steps.version.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" \
            "build/Debug/F407_V1.0-$TAG.elf" \
            "build/Debug/F407_V1.0-$TAG.map" \
            --target "${{ github.sha }}" \
            --title "$TAG" \
            --notes-file release-notes.md
